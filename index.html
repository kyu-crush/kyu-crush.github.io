  <head>

    <meta

    <meta

    <link rel="canonical" href="https://kyuafterdark.github.io/" />

    <title>Kyu Crush | Sweet Links</title>

    <link
      rel="icon"
      type="image/png"
      href="https://raw.githubusercontent.com/YOUR_GITHUB_USER/YOUR_REPO/main/kyu-crush.png"
    />

    <script>
      (function () {
        const savedTheme = localStorage.getItem("kyu_crush_theme") || "light";
        document.documentElement.dataset.theme = savedTheme;
      })();
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z02Y2MPX8D"></script>

    <script>
      window.dataLayer = window.dataLayer || [];

      function gtag() {
        dataLayer.push(arguments);
      }

      gtag("js", new Date());
      gtag("config", "G-Z02Y2MPX8D");

      function trackClick(linkName, linkUrl) {
        gtag("event", "outbound_click", {
          brand: "kyu_crush",
          link_name: linkName,
          link_url: linkUrl
        });
      }

      function updateThemeMeta(theme) {
        const themeColorMeta = document.getElementById("themeColorMeta");

        if (!themeColorMeta) return;

        themeColorMeta.setAttribute(
          "content",
          theme === "dark" ? "#050505" : "#b78978"
        );
      }

      function setTheme(theme) {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem("kyu_crush_theme", theme);
        updateThemeMeta(theme);

        const icon = document.querySelector(".themeIcon");
        const label = document.querySelector(".themeLabel");

        if (!icon || !label) return;

        if (theme === "dark") {
          icon.textContent = "☀️";
          label.textContent = "Light";
        } else {
          icon.textContent = "🌙";
          label.textContent = "Dark";
        }
      }

      function toggleTheme() {
        const currentTheme = document.documentElement.dataset.theme || "light";
        setTheme(currentTheme === "dark" ? "light" : "dark");
      }

      window.addEventListener("DOMContentLoaded", function () {
        setTheme(document.documentElement.dataset.theme || "light");
      });
    </script>

    <style>
      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      :root {
        --cream: #f7dfc6;
        --vanilla: #f5c777;
        --peach: #ff806f;
        --bubblegum: #e84f8f;
        --cherry: #f04375;
        --sky: #5da4c5;
        --mint: #77d0b8;
        --choco: #3a2418;
        --coffee: #5b3828;
        --white: #fff0dc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(245, 199, 119, 0.34) 0%, transparent 28%),
          radial-gradient(circle at 78% 22%, rgba(232, 79, 143, 0.22) 0%, transparent 30%),
          radial-gradient(circle at 80% 86%, rgba(93, 164, 197, 0.26) 0%, transparent 34%),
          linear-gradient(135deg, #b78978 0%, #a5798e 46%, #6f96aa 100%);
        color: var(--choco);
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
        overflow-x: hidden;
        padding: 20px 0;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
        background-size: 42px 42px;
        opacity: 0.42;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 241, 222, 0.22) 0%, transparent 34%),
          radial-gradient(circle at 50% 100%, rgba(58, 36, 24, 0.20) 0%, transparent 42%);
        pointer-events: none;
        z-index: 0;
      }

      .wrap {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 430px;
        padding: 24px;
      }

      .card {
        position: relative;
        background: rgba(255, 240, 220, 0.88);
        border: 2px solid rgba(255, 255, 255, 0.48);
        border-radius: 30px;
        padding: 42px 22px 24px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.22) inset,
          0 24px 52px rgba(54, 31, 22, 0.28),
          0 10px 28px rgba(232, 79, 143, 0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .themeToggle {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 3;
        border: 2px solid rgba(255, 255, 255, 0.56);
        background: rgba(255, 255, 255, 0.44);
        color: var(--choco);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        box-shadow: 0 8px 18px rgba(58, 36, 24, 0.16);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition:
          transform 0.18s ease,
          background 0.22s ease,
          border-color 0.22s ease;
      }

      .themeToggle:hover {
        transform: translateY(-1px);
      }

      .profile {
        width: 124px;
        height: 124px;
        object-fit: cover;
        border-radius: 50%;
        display: block;
        margin: 0 auto 18px;
        border: 4px solid var(--white);
        box-shadow:
          0 0 0 5px rgba(240, 67, 117, 0.16),
          0 0 0 10px rgba(245, 199, 119, 0.22),
          0 15px 28px rgba(58, 36, 24, 0.22);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 42px;
        line-height: 1.02;
        font-weight: 900;
        letter-spacing: -0.055em;
        color: var(--choco);
        text-shadow:
          1px 2px 0 rgba(245, 199, 119, 0.54),
          -1px -1px 0 rgba(255, 255, 255, 0.44);
      }

      .bio {
        margin: 0 auto 8px;
        color: rgba(58, 36, 24, 0.82);
        font-size: 15px;
        line-height: 1.45;
        font-weight: 700;
      }

      .trust {
        margin: 0 auto 22px;
        color: rgba(58, 36, 24, 0.58);
        font-size: 13px;
        font-weight: 700;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 340px;
        margin: 0 auto;
      }

      .btn {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        min-height: 58px;
        padding: 17px 18px;
        border-radius: 20px;
        text-decoration: none;
        font-size: 17px;
        font-weight: 900;
        line-height: 1.2;
        letter-spacing: 0.01em;
        color: white;
        text-align: center;
        border: 2px solid rgba(255, 255, 255, 0.50);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.14) inset,
          0 10px 22px rgba(58, 36, 24, 0.20);
        transition:
          transform 0.18s ease,
          opacity 0.18s ease,
          box-shadow 0.22s ease,
          border-color 0.22s ease,
          background 0.22s ease;
      }

      .btn:hover {
        transform: translateY(-2px) scale(1.018);
        opacity: 1;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.18) inset,
          0 14px 26px rgba(58, 36, 24, 0.22);
      }

      .btn:active {
        transform: scale(0.985);
      }

      .btn:focus-visible,
      .themeToggle:focus-visible {
        outline: 3px solid rgba(58, 36, 24, 0.90);
        outline-offset: 3px;
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -110%;
        width: 42%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.35),
          transparent
        );
        transform: skewX(-20deg);
      }

      .btn:hover::before {
        left: 125%;
        transition: left 0.7s ease;
      }

      .btnText {
        display: flex;
        flex-direction: column;
        align-items: center;
        line-height: 1.1;
      }

      .btnTitle {
        font-size: 17px;
        font-weight: 900;
      }

      .btnSub {
        margin-top: 4px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.07em;
        opacity: 0.78;
        text-transform: uppercase;
      }

      .mainProfile {
        background: linear-gradient(135deg, #e84f8f, #f04375);
      }

      .mainProfile:hover {
        transform: translateY(-2px) scale(1.03);
      }

      .instagram {
        background: linear-gradient(135deg, #ff806f, #e84f8f);
      }

      .twitter {
        background: linear-gradient(135deg, #4a2c1d, #6a3d25);
      }

      .telegram {
        background: linear-gradient(135deg, #5da4c5, #77d0b8);
        color: var(--choco);
      }

      .footer {
        font-size: 12px;
        font-weight: 800;
        color: rgba(58, 36, 24, 0.48);
        margin-top: 20px;
      }

      html[data-theme="dark"] body {
        background:
          radial-gradient(circle at 50% 0%, rgba(120, 42, 255, 0.18) 0%, rgba(120, 42, 255, 0.05) 28%, transparent 52%),
          radial-gradient(circle at 50% 100%, rgba(225, 48, 108, 0.16) 0%, rgba(225, 48, 108, 0.05) 30%, transparent 56%),
          #050505;
        color: white;
      }

      html[data-theme="dark"] body::before {
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 38px 38px;
        opacity: 1;
        mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      }

      html[data-theme="dark"] body::after {
        background:
          radial-gradient(circle at top center, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0.02) 14%, transparent 38%);
      }

      html[data-theme="dark"] .card {
        background: rgba(14, 14, 18, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.11);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 12px 42px rgba(0, 0, 0, 0.48),
          0 0 54px rgba(156, 66, 255, 0.10),
          0 0 34px rgba(225, 48, 108, 0.08);
      }

      html[data-theme="dark"] .themeToggle {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: white;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      }

      html[data-theme="dark"] .profile {
        border: 2px solid rgba(255, 255, 255, 0.13);
        box-shadow:
          0 0 0 4px rgba(255, 255, 255, 0.03),
          0 0 30px rgba(156, 66, 255, 0.16),
          0 0 20px rgba(225, 48, 108, 0.10);
      }

      html[data-theme="dark"] h1 {
        color: white;
        text-shadow: none;
      }

      html[data-theme="dark"] .bio {
        color: rgba(255, 255, 255, 0.74);
      }

      html[data-theme="dark"] .trust {
        color: rgba(255, 255, 255, 0.46);
      }

      html[data-theme="dark"] .footer {
        color: rgba(255, 255, 255, 0.48);
      }

      html[data-theme="dark"] .btn {
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 8px 22px rgba(0, 0, 0, 0.35);
      }

      html[data-theme="dark"] .mainProfile {
        background: linear-gradient(135deg, #ff8c00, #ff4f00);
        border: 1px solid rgba(255, 255, 255, 0.24);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.07) inset,
          0 0 32px rgba(255, 140, 0, 0.42),
          0 10px 24px rgba(0, 0, 0, 0.34);
      }

      html[data-theme="dark"] .instagram {
        background: linear-gradient(135deg, #e1306c, #8f1d7a);
        border: 1px solid rgba(255, 255, 255, 0.20);
      }

      html[data-theme="dark"] .twitter {
        background: linear-gradient(135deg, #2a2a2a, #111111);
        border: 1px solid rgba(255, 255, 255, 0.24);
      }

      html[data-theme="dark"] .twitter:hover {
        background: linear-gradient(135deg, #343434, #1d1d1d);
        border-color: rgba(255, 255, 255, 0.34);
      }

      html[data-theme="dark"] .telegram {
        background: linear-gradient(135deg, #4f6f8d, #2f3d4b);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.22);
      }

      html[data-theme="dark"] .telegram:hover {
        background: linear-gradient(135deg, #5b7d9d, #384858);
        border-color: rgba(255, 255, 255, 0.30);
      }

      html[data-theme="dark"] .btn:focus-visible,
      html[data-theme="dark"] .themeToggle:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.95);
        outline-offset: 3px;
      }

      @media (max-width: 480px) {
        body {
          align-items: flex-start;
        }

        .wrap {
          padding: 16px;
        }

        .card {
          padding: 42px 18px 20px;
          border-radius: 26px;
        }

        .themeToggle {
          top: 14px;
          right: 14px;
          padding: 7px 11px;
        }

        h1 {
          font-size: 36px;
        }

        .bio {
          font-size: 15px;
        }

        .btn {
          min-height: 60px;
          font-size: 16px;
          padding: 16px;
          border-radius: 18px;
        }

        .links {
          gap: 12px;
        }
      }
    </style>
  </head>

  <body>
    <main class="wrap">

  </body>
